<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="description" content="IronLog — personal hypertrophy tracker" />

    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IronLog" />

    <title>IronLog</title>
    <style>
      /* Splash shown until React mounts; removed by App on first render. */
      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 100;
        transition: opacity 0.35s ease;
      }
      #splash.splash--out {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-mark {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #cdfa50;
        animation: splash-pulse 1.1s ease-in-out infinite;
      }
      #splash .splash-word {
        color: #f2f2f0;
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.32em;
        text-indent: 0.32em;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.55); opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <div class="splash-mark"></div>
      <div class="splash-word">IRONLOG</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
